<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DotVoice — Braille Reader</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>DotVoice</h1>
    <p class="subtitle">Real-time Braille to Speech</p>
  </header>

  <div class="toggle-row">
    <button class="toggle-btn" onclick="toggleContrast()" aria-label="Toggle high contrast mode">High Contrast</button>
    <button class="toggle-btn" onclick="increaseFontSize()" aria-label="Increase text size">A+</button>
    <button class="toggle-btn" onclick="decreaseFontSize()" aria-label="Decrease text size">A-</button>
  </div>

  <main>
    <section class="video-panel" aria-label="Camera feed showing detected Braille dots">
      <img id="video" src="/video_feed" alt="Live camera feed with detected Braille dot overlays" />
    </section>

    <section class="info-panel">
      <div class="transcript-box" role="region" aria-label="Detected Braille text">
        <label id="transcript-label">Detected Text</label>
        <p id="transcript" aria-live="polite" aria-atomic="true" aria-labelledby="transcript-label">Waiting for Braille...</p>
      </div>

      <div class="guidance-box" role="region" aria-label="Camera positioning guidance">
        <label id="guidance-label">Camera Guidance</label>
        <p id="guidance" aria-live="polite" aria-labelledby="guidance-label">Starting...</p>
      </div>

      <div class="confidence-box" role="status" aria-label="Detection confidence">
        <label>Confidence</label>
        <div id="confidence-bar-wrap">
          <div id="confidence-bar"></div>
        </div>
        <span id="confidence-label-val">—</span>
      </div>

      <div class="stats-box" aria-label="Detection statistics">
        <span id="dots-count">Dots: 0</span>
        <span id="blur-score">Blur: 0.0</span>
        <span id="fps-display">FPS: —</span>
      </div>

      <div class="controls" role="group" aria-label="Playback controls">
        <button id="btn-read" onclick="readAloud()" aria-label="Read detected text aloud (Space)">
          Read Aloud <kbd>Space</kbd>
        </button>
        <button id="btn-repeat" onclick="repeatLast()" aria-label="Repeat last spoken text (R)">
          Repeat <kbd>R</kbd>
        </button>
      </div>

      <div class="upload-box" role="region" aria-label="Upload a Braille image">
        <label class="upload-label-text">Or upload a Braille photo</label>
        <label class="upload-btn" for="file-input" aria-label="Choose a Braille image file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Choose file
        </label>
        <input type="file" id="file-input" accept="image/*" aria-label="Upload Braille image" onchange="uploadImage()" />
        <p id="upload-result" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
